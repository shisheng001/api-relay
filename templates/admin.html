<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API中转站 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f6fa;
            color: #2d3436;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .stat-card h3 { color: #636e72; font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #2d3436; }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #dfe6e9;
            padding-bottom: 10px;
        }
        .tab {
            padding: 10px 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 15px;
            color: #636e72;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tab:hover { background: #f1f2f6; }
        .tab.active { 
            background: #667eea; 
            color: white;
        }
        
        /* 内容区 */
        .content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        /* 表格 */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid #dfe6e9;
        }
        th { 
            background: #f8f9fa;
            font-weight: 600;
            color: #2d3436;
        }
        tr:hover { background: #f8f9fa; }
        
        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-success { background: #00b894; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        
        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            min-width: 400px;
        }
        .modal-header {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f2f6;
        }
        .modal-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        /* 登录页 */
        .login-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 { 
            text-align: center; 
            margin-bottom: 30px;
            color: #667eea;
        }
        
        /* 隐藏 */
        .hidden { display: none !important; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .stats { grid-template-columns: 1fr; }
            table { font-size: 13px; }
            th, td { padding: 10px 8px; }
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h2>🔐 API中转站管理后台</h2>
            <div class="form-group">
                <label>管理员账号</label>
                <input type="text" id="loginUsername" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="doLogin()">
                登录
            </button>
        </div>
    </div>

    <!-- 管理后台 -->
    <div id="adminPage" class="container hidden">
        <div class="header">
            <h1>📊 API中转站管理后台</h1>
            <p>实时监控系统状态，管理用户和充值</p>
            <button class="btn btn-danger" style="margin-top: 15px;" onclick="doLogout()">退出登录</button>
        </div>
        
        <!-- 统计 -->
        <div class="stats">
            <div class="stat-card">
                <h3>👥 用户总数</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>💰 总充值金额</h3>
                <div class="value" id="totalRecharge">-</div>
            </div>
            <div class="stat-card">
                <h3>📈 今日调用</h3>
                <div class="value" id="todayCalls">-</div>
            </div>
            <div class="stat-card">
                <h3>⏱️ 系统运行</h3>
                <div class="value" id="uptime">-</div>
            </div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('users')">👥 用户管理</button>
            <button class="tab" onclick="switchTab('create')">➕ 创建用户</button>
            <button class="tab" onclick="switchTab('usage')">📊 使用记录</button>
        </div>
        
        <!-- 用户管理 -->
        <div id="usersTab" class="content">
            <div style="margin-bottom: 20px;">
                <input type="text" id="searchUser" placeholder="搜索用户名或API Key" 
                       style="max-width: 300px;" onkeyup="searchUsers()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>用户ID</th>
                        <th>用户名</th>
                        <th>API Key</th>
                        <th>余额</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="6" style="text-align: center;">加载中...</td></tr>
                </tbody>
            </table>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="prevPage()">上一页</button>
                <span style="line-height: 38px;">第 <span id="currentPage">1</span> 页</span>
                <button class="btn btn-primary" onclick="nextPage()">下一页</button>
            </div>
        </div>
        
        <!-- 创建用户 -->
        <div id="createTab" class="content hidden">
            <h3 style="margin-bottom: 20px;">创建新用户</h3>
            <div class="form-group">
                <label>用户名（可选）</label>
                <input type="text" id="newUsername" placeholder="留空自动生成">
            </div>
            <button class="btn btn-success" onclick="createUser()">创建用户</button>
        </div>
        
        <!-- 使用记录 -->
        <div id="usageTab" class="content hidden">
            <h3 style="margin-bottom: 20px;">最近使用记录</h3>
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>模型</th>
                        <th>输入Token</th>
                        <th>输出Token</th>
                        <th>费用</th>
                    </tr>
                </thead>
                <tbody id="usageTable">
                    <tr><td colspan="5" style="text-align: center;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 充值模态框 -->
    <div id="rechargeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">💰 给用户充值</div>
            <div class="form-group">
                <label>用户</label>
                <input type="text" id="rechargeUser" readonly>
            </div>
            <div class="form-group">
                <label>充值金额（元）</label>
                <input type="number" id="rechargeAmount" placeholder="输入金额" value="100">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeRechargeModal()">取消</button>
                <button class="btn btn-success" onclick="doRecharge()">确认充值</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = window.location.origin;
        let adminToken = localStorage.getItem('adminToken');
        let currentUserId = '';
        let currentPage = 1;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (adminToken) {
                showAdminPage();
                loadStats();
                loadUsers();
            } else {
                showLoginPage();
            }
        });
        
        // 登录
        async function doLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    showAdminPage();
                    loadStats();
                    loadUsers();
                } else {
                    alert('登录失败：' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('登录失败：' + e.message);
            }
        }
        
        // 登出
        function doLogout() {
            adminToken = '';
            localStorage.removeItem('adminToken');
            showLoginPage();
        }
        
        // 页面切换
        function showLoginPage() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('adminPage').classList.add('hidden');
        }
        
        function showAdminPage() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('adminPage').classList.remove('hidden');
        }
        
        // 标签页切换
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('usersTab').classList.add('hidden');
            document.getElementById('createTab').classList.add('hidden');
            document.getElementById('usageTab').classList.add('hidden');
            
            if (tab === 'users') {
                document.getElementById('usersTab').classList.remove('hidden');
                loadUsers();
            } else if (tab === 'create') {
                document.getElementById('createTab').classList.remove('hidden');
            } else if (tab === 'usage') {
                document.getElementById('usageTab').classList.remove('hidden');
                loadUsage();
            }
        }
        
        // 加载统计
        async function loadStats() {
            // 简单实现，实际应调用后端API
            document.getElementById('totalUsers').textContent = '-';
            document.getElementById('totalRecharge').textContent = '-';
            document.getElementById('todayCalls').textContent = '-';
            document.getElementById('uptime').textContent = '运行中';
        }
        
        // 加载用户列表
        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/users?page=${currentPage}&limit=20`, {
                    headers: { 'admin_token': adminToken }
                });
                const data = await res.json();
                
                if (data.users) {
                    renderUsers(data.users);
                    document.getElementById('currentPage').textContent = currentPage;
                }
            } catch (e) {
                console.error('加载用户失败:', e);
            }
        }
        
        // 渲染用户表格
        function renderUsers(users) {
            const tbody = document.getElementById('usersTable');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id.substring(0, 8)}...</td>
                    <td>${user.username || '-'}</td>
                    <td><code style="font-size: 12px; cursor:pointer;" class="api-key-cell" data-key="${user.api_key}" title="点击复制完整Key">${user.api_key.substring(0,8)}***${user.api_key.slice(-4)}</code></td>
                    <td style="color: ${user.balance > 0 ? '#00b894' : '#e74c3c'}; font-weight: bold;">
                        ¥${user.balance.toFixed(2)}
                    </td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-success" onclick="openRechargeModal('${user.id}', '${user.username}')">
                            充值
                        </button>
                        <button class="btn btn-primary" onclick="copyApiKey('${user.api_key}')">
                            复制Key
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 创建用户
        async function createUser() {
            const username = document.getElementById('newUsername').value || undefined;
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/user/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'admin_token': adminToken
                    },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert(`用户创建成功！\n\nAPI Key: ${data.api_key}\n（已自动复制到剪贴板）\n\n请保存好，忘记无法找回！`);\n                    navigator.clipboard.writeText(data.api_key);
                    document.getElementById('newUsername').value = '';
                    switchTab('users');
                } else {
                    alert('创建失败：' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('创建失败：' + e.message);
            }
        }
        
        // 充值模态框
        function openRechargeModal(userId, username) {
            currentUserId = userId;
            document.getElementById('rechargeUser').value = username || userId;
            document.getElementById('rechargeModal').classList.add('active');
        }
        
        function closeRechargeModal() {
            document.getElementById('rechargeModal').classList.remove('active');
        }
        
        async function doRecharge() {
            const amount = parseFloat(document.getElementById('rechargeAmount').value);
            if (!amount || amount <= 0) {
                alert('请输入有效金额');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/recharge`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'admin_token': adminToken
                    },
                    body: JSON.stringify({ user_id: currentUserId, amount })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert(`充值成功！金额: ¥${amount}`);
                    closeRechargeModal();
                    loadUsers();
                } else {
                    alert('充值失败：' + (data.detail || '未知错误'));
                }
            } catch (e) {
                alert('充值失败：' + e.message);
            }
        }
        
        // 复制API Key
        function copyApiKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                alert('API Key 已复制到剪贴板');
            });
        }

        // 点击脱敏的api_key单元格复制完整key
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('api-key-cell')) {
                const fullKey = e.target.getAttribute('data-key');
                if (fullKey) {
                    navigator.clipboard.writeText(fullKey).then(() => {
                        const orig = e.target.textContent;
                        e.target.textContent = '已复制';
                        setTimeout(() => { e.target.textContent = orig; }, 1200);
                    });
                }
            }
        });
        
        // 搜索用户
        function searchUsers() {
            const keyword = document.getElementById('searchUser').value.toLowerCase();
            const rows = document.getElementById('usersTable').querySelectorAll('tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        }
        
        // 分页
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadUsers();
            }
        }
        
        function nextPage() {
            currentPage++;
            loadUsers();
        }
        
        // 加载使用记录
        async function loadUsage() {
            // 简化实现
            document.getElementById('usageTable').innerHTML = 
                '<tr><td colspan="5" style="text-align: center;">暂无数据</td></tr>';
        }
    </script>
</body>
</html>
